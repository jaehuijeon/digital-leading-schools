<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 AI·디지털 활용 선도학교 현황</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a56db, #0e3a8c);
    color: white;
    padding: 20px 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

  .main {
    display: flex;
    gap: 0;
    height: calc(100vh - 80px);
  }

  /* === MAP PANEL === */
  .map-panel {
    flex: 0 0 420px;
    background: white;
    padding: 20px 16px;
    border-right: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  .map-panel h2 {
    font-size: 0.9rem;
    color: #64748b;
    margin-bottom: 12px;
    text-align: center;
  }
  .map-panel svg {
    width: 100%;
    max-width: 380px;
    cursor: default;
  }
  .province {
    fill: #e2e8f0;
    stroke: #fff;
    stroke-width: 1.5;
    transition: fill 0.2s;
  }
  .province.has-data {
    fill: #bfdbfe;
    cursor: pointer;
  }
  .province.has-data:hover {
    fill: #93c5fd;
  }
  .province.selected {
    fill: #1a56db !important;
    stroke: #0e3a8c;
    stroke-width: 2;
  }
  .province-label {
    font-size: 9px;
    fill: #334155;
    pointer-events: none;
    text-anchor: middle;
    font-family: 'Malgun Gothic', sans-serif;
  }
  .province-label.has-data {
    fill: #1e3a8a;
    font-weight: bold;
    font-size: 9.5px;
  }
  .province-label.selected { fill: white; }

  .legend {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-size: 0.78rem;
    color: #64748b;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 14px; height: 14px; border-radius: 3px;
    flex-shrink: 0;
  }

  /* === INFO PANEL === */
  .info-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .info-header {
    background: white;
    border-bottom: 1px solid #e2e8f0;
    padding: 18px 24px;
  }
  .info-header .region-name {
    font-size: 1.3rem;
    font-weight: 700;
    color: #1e3a8a;
  }
  .info-header .region-stats {
    font-size: 0.85rem;
    color: #64748b;
    margin-top: 4px;
  }
  .info-header .stats-chips {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .chip-total { background: #dbeafe; color: #1e3a8a; }
  .chip-초 { background: #dcfce7; color: #166534; }
  .chip-중 { background: #fef9c3; color: #854d0e; }
  .chip-고 { background: #fee2e2; color: #991b1b; }
  .chip-특 { background: #f3e8ff; color: #6b21a8; }

  .search-bar {
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-bar input {
    flex: 1;
    min-width: 180px;
    padding: 8px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
  }
  .search-bar input:focus { border-color: #1a56db; }
  .filter-btn {
    padding: 6px 14px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    background: white;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .filter-btn:hover { background: #f1f5f9; }
  .filter-btn.active-초 { background: #dcfce7; border-color: #16a34a; color: #166534; font-weight: 600; }
  .filter-btn.active-중 { background: #fef9c3; border-color: #ca8a04; color: #854d0e; font-weight: 600; }
  .filter-btn.active-고 { background: #fee2e2; border-color: #dc2626; color: #991b1b; font-weight: 600; }
  .filter-btn.active-특 { background: #f3e8ff; border-color: #9333ea; color: #6b21a8; font-weight: 600; }
  .filter-btn.active-전체 { background: #dbeafe; border-color: #1a56db; color: #1e3a8a; font-weight: 600; }

  .school-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #94a3b8;
    text-align: center;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.95rem; }

  .district-group { margin-bottom: 20px; }
  .district-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .district-count {
    background: #f1f5f9;
    color: #475569;
    padding: 1px 7px;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
  }

  .school-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 8px;
  }

  .school-card {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .school-card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-color: #93c5fd;
  }
  .school-badge {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
    flex-shrink: 0;
  }
  .badge-초 { background: #dcfce7; color: #166534; }
  .badge-중 { background: #fef9c3; color: #854d0e; }
  .badge-고 { background: #fee2e2; color: #991b1b; }
  .badge-특 { background: #f3e8ff; color: #6b21a8; }
  .badge-기타 { background: #f1f5f9; color: #475569; }

  .school-name {
    font-size: 0.83rem;
    color: #1e293b;
    line-height: 1.3;
    font-weight: 500;
  }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: #94a3b8;
    font-size: 0.9rem;
  }

  /* scrollbar styling */
  .school-list::-webkit-scrollbar { width: 6px; }
  .school-list::-webkit-scrollbar-track { background: transparent; }
  .school-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>

// 상태
// ====================================================
let selectedRegion = null;
let currentFilter = '전체';
let currentSearch = '';

// ====================================================
// 학교급 정규화
// ====================================================
function normalizeLevel(raw) {
  if (!raw) return '기타';
  const s = raw.trim();
  if (s === '초' || s.includes('초등')) return '초';
  if (s === '중' || s.includes('중학')) return '중';
  if (s === '고' || s.includes('고등')) return '고';
  if (s === '특' || s.includes('특수')) return '특';
  return '기타';
}

// ====================================================


function selectRegion(regionId) {
  // 이전 선택 해제
  document.querySelectorAll('.province').forEach(e => e.classList.remove('selected'));
  document.querySelectorAll('.province-label').forEach(e => e.classList.remove('selected'));

  // 새 선택
  const pe = document.getElementById('province-' + regionId);
  const le = document.getElementById('label-' + regionId);
  if (pe) pe.classList.add('selected');
  if (le) le.classList.add('selected');

  selectedRegion = regionId;
  currentFilter = '전체';
  currentSearch = '';
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  resetFilterButtons();
  renderInfo(regionId);
}

function resetFilterButtons() {
  ['전체','초','중','고','특'].forEach(f => {
    const btn = document.getElementById('btn-' + f);
    if (btn) {
      btn.className = 'filter-btn' + (f === '전체' ? ' active-전체' : '');
    }
  });
}

function setFilter(level) {
  currentFilter = level;
  resetFilterButtons();
  const btn = document.getElementById('btn-' + level);
  if (btn) btn.className = 'filter-btn active-' + level;
  renderSchoolList(selectedRegion);
}

function filterSchools() {
  currentSearch = document.getElementById('searchInput').value.trim();
  renderSchoolList(selectedRegion);
}

// ====================================================
// 정보 패널 렌더링
// ====================================================
function renderInfo(regionId) {
  const schools = schoolData[regionId] || [];
  const normalized = schools.map(s => ({...s, _level: normalizeLevel(s['학교급'])}));

  // 통계
  const counts = { total: normalized.length, 초:0, 중:0, 고:0, 특:0 };
  normalized.forEach(s => { if (counts[s._level] !== undefined) counts[s._level]++; });

  document.getElementById('regionName').textContent = regionId;
  document.getElementById('regionStats').textContent =
    `총 ${counts.total}개 선도학교 선정 | 2026년 AI·디지털 활용 선도학교`;

  const chipsEl = document.getElementById('statsChips');
  chipsEl.innerHTML = `
    <span class="chip chip-total">전체 ${counts.total}교</span>
    ${counts.초 ? `<span class="chip chip-초">초등 ${counts.초}교</span>` : ''}
    ${counts.중 ? `<span class="chip chip-중">중학교 ${counts.중}교</span>` : ''}
    ${counts.고 ? `<span class="chip chip-고">고등학교 ${counts.고}교</span>` : ''}
    ${counts.특 ? `<span class="chip chip-특">특수학교 ${counts.특}교</span>` : ''}
  `;

  document.getElementById('searchBar').style.display = 'flex';
  renderSchoolList(regionId);
}

function renderSchoolList(regionId) {
  const schools = schoolData[regionId] || [];
  const normalized = schools.map(s => ({...s, _level: normalizeLevel(s['학교급'])}));

  // 필터링
  let filtered = normalized.filter(s => {
    const levelMatch = currentFilter === '전체' || s._level === currentFilter;
    const searchMatch = !currentSearch || s['학교명'].includes(currentSearch);
    return levelMatch && searchMatch;
  });

  const listEl = document.getElementById('schoolList');

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
    return;
  }

  // 지역별 그룹핑
  const groups = {};
  filtered.forEach(s => {
    const district = s['지역'] || '기타';
    if (!groups[district]) groups[district] = [];
    groups[district].push(s);
  });

  const levelLabel = { 초:'초등', 중:'중학교', 고:'고등학교', 특:'특수학교', 기타:'' };

  let html = '';
  Object.entries(groups).sort((a,b) => a[0].localeCompare(b[0], 'ko')).forEach(([district, list]) => {
    html += `<div class="district-group">
      <div class="district-title">
        📍 ${district}
        <span class="district-count">${list.length}교</span>
      </div>
      <div class="school-grid">`;
    list.forEach(s => {
      const lv = s._level;
      const lvLabel = levelLabel[lv] || lv;
      html += `<div class="school-card">
        <div class="school-badge badge-${lv}">${lvLabel || lv}</div>
        <div class="school-name">${s['학교명']}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  listEl.innerHTML = html;
}



// 지도 클릭 이벤트 설정
document.querySelectorAll('.province').forEach(el => {
  const nm = el.getAttribute('data-name');
  if (nm && schoolData[nm]) {
    el.classList.add('has-data');
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => selectRegion(nm));
  }
});
document.querySelectorAll('.province-label').forEach(el => {
  const nm = el.getAttribute('data-name');
  if (nm && schoolData[nm]) el.classList.add('has-data');
});

</script>
